name: kleff

services:

  # ── Web (Next.js management UI) ───────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── API (Go control plane) ────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HTTP_PORT: 8080
      DATABASE_URL: postgres://kleff:kleff@postgres:5432/kleff?sslmode=disable
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
      RUNTIME_PROVIDER: docker
      SECRET_KEY: change-me
      KLEFF_SHARED_SECRET: change-me-node-bootstrap
      DAEMON_QUEUE_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kleff
      POSTGRES_PASSWORD: kleff
      POSTGRES_DB: kleff
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kleff -d kleff"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

networks:
  default:
    name: kleff

volumes:
  postgres_data:
