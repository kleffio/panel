feature:
  - changed-files:
      - any-glob-to-any-file: ["src/**", "app/**", "components/**", "pages/**"]
  - head-branch: ["^feature/", "^feat/"]

bugfix:
  - head-branch: ["^bugfix/", "^fix/"]

chore:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "**/Dockerfile"
          - "**/docker-compose*.yml"
          - "package*.json"
  - head-branch: ["^chore/", "^deps/"]

docs:
  - changed-files:
      - any-glob-to-any-file: ["**/*.md", "docs/**"]

refactor:
  - head-branch: ["^refactor/"]

security:
  - changed-files:
      - any-glob-to-any-file: ["**/auth/**", "**/security/**"]
  - head-branch: ["^security/"]

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.ts"
          - "**/*.test.tsx"
          - "**/*.spec.ts"
          - "test/**"
  - head-branch: ["^test/", "^tests/"]
