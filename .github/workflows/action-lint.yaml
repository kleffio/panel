---
name: Action Lint
"on":
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Action Lint
    uses: kleffio/.github/.github/workflows/_actionlint.yml@main
