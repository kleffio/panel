name: kleff-dev

services:

  # ── Web (Next.js management UI) ───────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      API_BASE_URL: http://api:8080
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      api:
        condition: service_healthy

  # ── API (Go control plane) ────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    user: root
    volumes:
      - ./api:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      KLEFF_ENV: local
      HTTP_PORT: 8080
      DATABASE_URL: postgres://kleff:kleff@postgres:5432/kleff?sslmode=disable
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: debug
      RUNTIME_PROVIDER: docker
      SECRET_KEY: local-dev-secret
      KLEFF_SHARED_SECRET: local-dev-shared-secret
      DAEMON_QUEUE_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kleff
      POSTGRES_PASSWORD: kleff
      POSTGRES_DB: kleff
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kleff -d kleff"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  default:
    name: kleff-dev

volumes:
  postgres_dev_data:
